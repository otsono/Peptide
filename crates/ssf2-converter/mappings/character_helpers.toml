# Character-only Haxe templates emitted into Character/Script.hx and the
# character *Stats.hx files. `{{slot}}` placeholders are filled at codegen time;
# data tables that drive codegen stay in Rust.

[audio]

header_comment = '''
// ── SSF2 sound triggers (playAttackSound / playVoiceSound) ──────────────────
// 1-based sound tables pulled from the SSF2 character's attackSound{N}_id /
// attackVoice{N}_id fields (raw ids kept as a record of intent). Globals route
// to a Fraymakers built-in (GlobalSfx) via the resolver; everything else is
// fetched from this character's audio bank. Voice playback does not overlap —
// the active clip is stopped before a new one starts.
'''

# {{entries}}
attack_sounds_decl = '''
var _attackSounds = {{entries}};
'''

# {{entries}}
voice_sounds_decl = '''
var _voiceSounds = {{entries}};
'''

active_voice_clip_decl = '''
var _activeVoiceClip = null;
'''

play_attack_sound_fn = '''
function playAttackSound(n) {
	if (n < 1 || n > _attackSounds.length) return;
	_playResolvedSound(_attackSounds[n - 1]);
}

'''

play_voice_sound_fn = '''
function playVoiceSound(n) {
	if (n < 1 || n > _voiceSounds.length) return;
	if (_activeVoiceClip != null) { _activeVoiceClip.stop(); _activeVoiceClip = null; }
	_activeVoiceClip = _playResolvedSound(_voiceSounds[n - 1]);
}

'''

# {{global_cases}}
play_resolved_sound_resolver = '''
function _playResolvedSound(id) {
	switch (id) {
{{global_cases}}		default: return AudioClip.play(self.getResource().getContent(id));
	}
}

'''

# {{global_sfx}}, {{ssf2_id}}
global_sound_case = '''
		case "{{ssf2_id}}": return AudioClip.play(GlobalSfx.{{global_sfx}});
'''

voice_teardown_cleanup = '''
	if (_activeVoiceClip != null) {
		_activeVoiceClip.stop();
		_activeVoiceClip = null;
	}
'''

# {{ssf2_id}}
placeholder_array_entry_todo = '/* TODO: SSF2 sound "{{ssf2_id}}" has no FM equivalent */'

[jab]

chain_helpers = '''

// ── Jab chain — SSF2 Jab_21 sub-animations (begin / hit2 / hit3) ─────────────────
// SSF2 uses gotoAndPlay("hit2") / gotoAndPlay("hit3") to chain jabs on button press.
// In Fraymakers, jab1/jab2/jab3 are separate animations chained via CState transitions.

// Called from AnimationStats.jab1 last-frame handler (link in FrayTools):
function jab1_end() {
	if (entity.checkInput(ControlsObject.ATTACK)) {
		// Player pressed attack again — chain to jab2
		entity.setAnimation("jab2");
		entity.playCState(CState.JAB2);
	} else {
		// No input — return to idle
		entity.playCState(CState.IDLE);
	}
}

// Called from AnimationStats.jab2 last-frame handler:
function jab2_end() {
	if (entity.checkInput(ControlsObject.ATTACK)) {
		entity.setAnimation("jab3");
		entity.playCState(CState.JAB3);
	} else {
		entity.playCState(CState.IDLE);
	}
}

// Called from AnimationStats.jab3 last-frame handler:
function jab3_end() {
	entity.playCState(CState.IDLE);
}
'''

