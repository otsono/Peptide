# ── CharacterStats.hx ──
# {{parent}}, {{source_method}}
char_stats_banner = '''
// ─────────────────────────────────────────────────────────────────
// TODO: TRANSFORMATION FORM — manual wiring required.
//
// This character is a Final-Smash / transformation form of
// `{{parent}}` (SSF2 source: {{source_method}}). It ships as a peer
// entity in the SAME .fraytools project as `{{parent}}`, so that
// when Fraymakers exposes a transformation API the parent's
// Script.hx can swap between the two forms at runtime without a
// cross-project asset reload.
//
// Fraymakers does not yet expose that transformation API.
// Selecting this form directly from the FM roster will run
// these stats as-is — NOT what SSF2 does at runtime, where the
// form is entered via the parent's Final Smash trigger.
//
// To replicate the SSF2 behaviour you'll need to script the
// transformation in `{{parent}}`'s Script.hx (likely by swapping
// resources / stats / animations into the parent at the Final
// Smash trigger). Track the upstream FM API request:
//   https://github.com/Fraymakers (no transformation API yet)
// ─────────────────────────────────────────────────────────────────
'''

