# Headless match settings for peptide's `s` (start match) command.
# Tweak these and re-run ./run.sh — no need to touch the Rust patcher.
#
#   lives : stock count per player (999 = effectively infinite)
#   time  : match timer in seconds (0 = no timer / unlimited)
#
# These map to the engine's MatchSettingsConfig fields (lives f16, time f19),
# carried via the `matchSettings` virtual (t675: lives f8, time f24).
#
# Format: `key = value`, one per line. `#` starts a comment. Unknown keys are
# ignored; a missing key falls back to its built-in default (lives=999, time=0).
#
# This file is baked into the binary at build time AND read from disk at patch
# time, so an edited copy next to the `peptide` binary (or in the working dir,
# or pointed to by $PEPTIDE_MATCH_SETTINGS) overrides the default WITHOUT a
# rebuild.

lives = 999
time = 0
