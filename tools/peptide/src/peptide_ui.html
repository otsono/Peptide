<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Peptide</title>
<style>
  :root{
    /* Claude dark — warm charcoal, cream text, clay accent */
    --paper:#262624; --surface:#30302E; --ink:#F2F0E8; --muted:#9C978B;
    --clay:#D17C5E; --clay-deep:#C06E52; --clay-soft:#3A2E28;
    --border:#3C3B37; --chip:#33322E; --chip-hover:#3D3C37;
    --code-bg:#1F1E1C; --code-ink:#D9D5C8;
    --err-bg:#382826; --err-ink:#F0A192; --err-border:#553A35;
    --ok:#5FB07A;
    --shadow:0 1px 2px rgba(0,0,0,.28), 0 1px 3px rgba(0,0,0,.22);
    --shadow-pop:0 10px 34px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:-apple-system,"Segoe UI",system-ui,"Helvetica Neue",sans-serif;
    font-size:15px; line-height:1.5;
    display:flex; flex-direction:column; height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  /* ── header ─────────────────────────────────────────── */
  header{
    display:flex; align-items:center; gap:11px;
    padding:13px 18px; border-bottom:1px solid var(--border);
    background:rgba(38,38,36,.82); backdrop-filter:saturate(1.2) blur(6px);
  }
  .mark{
    width:30px;height:30px;border-radius:9px;background:var(--clay);
    color:#fff;font-weight:700;font-size:16px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 2px rgba(165,90,60,.35);
  }
  .title{font-weight:650;font-size:17px;letter-spacing:-.01em;}
  .subtitle{color:var(--muted);font-size:13px;margin-left:2px;}
  .spacer{flex:1;}
  .pill{
    display:flex;align-items:center;gap:7px;
    padding:5px 11px;border-radius:999px;background:var(--chip);
    color:var(--muted);font-size:12.5px;font-weight:500;
    transition:background .2s,color .2s;
  }
  .pill.live{background:#23302A;color:#8FCBA0;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
  .pill.live .dot{background:var(--ok);box-shadow:0 0 0 3px rgba(91,164,111,.18);}
  /* ── messages ───────────────────────────────────────── */
  #scroll{flex:1;overflow-y:auto;padding:18px 20px 8px;}
  #messages{display:flex;flex-direction:column;max-width:820px;margin:0 auto;}
  @keyframes in{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  /* group label — shown once per consecutive run of the same sender */
  .who{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;margin:16px 2px 5px;animation:in .18s ease both;}
  .who:first-child{margin-top:2px;}
  /* engine / received: plain text directly on the background (Claude-Code style) */
  .msg.engine{align-self:stretch;color:var(--ink);font-size:14.5px;line-height:1.55;
    padding:2px 2px;margin-bottom:3px;animation:in .18s ease both;word-wrap:break-word;}
  .msg.engine.err{color:var(--err-ink);}
  /* sent: a clay bubble on the right */
  .msg.you{align-self:flex-end;max-width:80%;background:var(--clay);color:#fff;
    padding:9px 14px;border-radius:18px 18px 6px 18px;box-shadow:var(--shadow);
    margin:6px 0 3px;font-size:14.5px;animation:in .18s ease both;}
  .msg.system{align-self:center;color:var(--muted);font-size:13px;
    padding:8px;max-width:90%;text-align:center;animation:in .18s ease both;}
  /* code/value output */
  .code{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:12.8px;
    background:var(--code-bg);color:var(--code-ink);border-radius:8px;
    padding:7px 11px;margin:1px 0 3px;white-space:pre-wrap;word-break:break-word;
    border:1px solid rgba(255,255,255,.04);}
  .msg.engine.err .code{background:rgba(240,161,146,.08);color:var(--err-ink);
    border-color:rgba(240,161,146,.14);}
  /* ── composer ───────────────────────────────────────── */
  .composer{padding:10px 18px 14px;border-top:1px solid var(--border);background:var(--paper);}
  .composer .inner{max-width:820px;margin:0 auto;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px;}
  .chip{
    border:1px solid var(--border);background:var(--chip);color:var(--ink);
    padding:5px 13px;border-radius:999px;font-size:13px;cursor:pointer;
    transition:background .15s,transform .05s;
  }
  .chip:hover{background:var(--chip-hover);}
  .chip:active{transform:translateY(1px);}
  .inputrow{
    display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--border);border-radius:14px;padding:6px 6px 6px 14px;
    box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s;
  }
  .inputrow:focus-within{border-color:var(--clay);box-shadow:0 0 0 3px rgba(204,120,92,.14);}
  #input{
    flex:1;border:none;outline:none;background:none;color:var(--ink);
    font:inherit;font-size:15px;padding:7px 0;
  }
  #input::placeholder{color:var(--muted);}
  #send{
    border:none;background:var(--clay);color:#fff;font:inherit;font-weight:600;
    font-size:14px;padding:9px 18px;border-radius:10px;cursor:pointer;
    transition:background .15s,transform .05s;
  }
  #send:hover{background:var(--clay-deep);}
  #send:active{transform:translateY(1px);}
  /* ── reconnect modal ────────────────────────────────── */
  .overlay{position:fixed;inset:0;background:rgba(15,15,14,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;animation:fade .15s ease;}
  .overlay.show{display:flex;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:26px 26px 22px;max-width:380px;width:84%;box-shadow:var(--shadow-pop);
    text-align:center;animation:pop .18s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:none;}}
  .modal .icon{width:46px;height:46px;border-radius:50%;background:var(--err-bg);
    display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:22px;}
  .modal h2{margin:0 0 7px;font-size:18px;font-weight:650;letter-spacing:-.01em;}
  .modal p{margin:0 0 18px;color:var(--muted);font-size:14px;line-height:1.5;}
  .modal .err{color:var(--err-ink);font-size:13px;margin:-8px 0 14px;}
  .btn-primary{border:none;background:var(--clay);color:#fff;font:inherit;font-weight:600;
    font-size:15px;padding:11px 22px;border-radius:11px;cursor:pointer;width:100%;
    transition:background .15s;display:inline-flex;align-items:center;justify-content:center;gap:9px;}
  .btn-primary:hover{background:var(--clay-deep);}
  .btn-primary:disabled{opacity:.7;cursor:default;}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* reconnect toast (auto-retry, no modal) */
  .banner{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-10px);
    background:var(--surface);border:1px solid var(--border);border-radius:999px;
    padding:8px 17px;display:none;align-items:center;gap:10px;box-shadow:var(--shadow-pop);
    z-index:40;opacity:0;transition:opacity .2s,transform .2s;font-size:13.5px;color:var(--ink);max-width:80%;}
  .banner.show{display:inline-flex;opacity:1;transform:translateX(-50%) translateY(0);}
  .banner .spin{border-color:rgba(204,120,92,.28);border-top-color:var(--clay);}
  /* scrollbar */
  #scroll::-webkit-scrollbar{width:10px;}
  #scroll::-webkit-scrollbar-thumb{background:#454440;border-radius:6px;border:3px solid var(--paper);}
  #scroll::-webkit-scrollbar-thumb:hover{background:#54534D;}
</style>
</head>
<body>
  <header>
    <div class="mark">P</div>
    <div>
      <span class="title">Peptide</span>
      <span class="subtitle">Fraymakers console</span>
    </div>
    <div class="spacer"></div>
    <div class="pill" id="pill"><span class="dot"></span><span id="pilltext">connecting…</span></div>
  </header>

  <div id="scroll"><div id="messages"></div></div>

  <div class="composer"><div class="inner">
    <div class="chips" id="chips"></div>
    <div class="inputrow">
      <input id="input" autocomplete="off" spellcheck="false"
             placeholder="Message Peptide  —  a command, or raw hscript…" />
      <button id="send">Send</button>
    </div>
  </div></div>

  <div class="banner" id="banner"><span class="spin"></span><span id="banner-text">Reconnecting…</span></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="icon">🔌</div>
      <h2 id="m-title">Connection lost</h2>
      <p id="m-msg">Fraymakers disconnected. Re-patch and boot it again to reconnect.</p>
      <div class="err" id="m-err"></div>
      <button class="btn-primary" id="reconnect">Reconnect</button>
    </div>
  </div>

<script>
  const $ = (id)=>document.getElementById(id);
  const messages = $("messages"), scroll = $("scroll");
  let spawned = false, charName = (window.__CHAR__||"sandbag"), port = (window.__PORT__||0);

  const QUICK = [
    ["Spawn","spawn"], ["State","state"], ["Physics","physics"],
    ["Anim","anim"], ["Jab","move jab"], ["Up Special","move special_up"],
    ["Characters","match.getCharacters()"], ["Help","help"],
  ];
  for(const [label,cmd] of QUICK){
    const b=document.createElement("button"); b.className="chip"; b.textContent=label;
    b.onclick=()=>send(cmd); $("chips").appendChild(b);
  }

  function atBottom(){ return scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 60; }
  function bump(){ scroll.scrollTop = scroll.scrollHeight; }

  let lastSender = null;
  function add(role, text, opts={}){
    const stick = atBottom();
    const sender = role==="you" ? "you" : (role==="system" ? "system" : "engine");
    if(sender==="engine"){
      if(lastSender!=="engine"){
        const who=document.createElement("div"); who.className="who"; who.textContent="engine";
        messages.appendChild(who);
      }
      const el=document.createElement("div");
      el.className="msg engine"+(opts.error?" err":"");
      if(opts.code){ const c=document.createElement("div"); c.className="code"; c.textContent=text; el.appendChild(c); }
      else { el.textContent=text; }
      messages.appendChild(el);
    } else if(sender==="you"){
      const el=document.createElement("div"); el.className="msg you"; el.textContent=text; messages.appendChild(el);
    } else {
      const el=document.createElement("div"); el.className="msg system"; el.textContent=text; messages.appendChild(el);
    }
    lastSender=sender;
    if(stick) bump();
  }

  function setStatus(live){
    const pill=$("pill");
    pill.classList.toggle("live", live);
    $("pilltext").textContent = live ? (charName + "  ·  :" + port) : "connecting…";
  }

  // engine → here (called by Rust via evaluate_script)
  window.onLine = function(line){
    if(line.startsWith("PORT:")){ port = line.slice(5).trim(); return; }
    if(line.startsWith("SYS:ERR:")){ add("engine", line.slice(8), {code:true,error:true}); return; }
    if(line.startsWith("SYS:")){ add("system", line.slice(4)); return; }
    if(line.indexOf("HELLO_FROM_FRAYMAKERS")>=0) return;
    if(line.indexOf("READY")>=0){
      setStatus(true);
      if(!spawned){ spawned=true; add("system","Engine ready — spawning "+charName+"…"); send("spawn"); }
      return;
    }
    if(line.startsWith("LAUNCHED")){
      const tok=(line.slice(8).trim().split(/\s+/)[0]||"");
      const id=(tok.split("::").pop()||tok).split(".")[0];
      if(id){ charName=id; setStatus(true); }
      if(typeof autoRetries!=='undefined') autoRetries=0; // a launched match = stable; re-arm auto-retry
      add("engine","Match launched · "+charName);
      return;
    }
    const error = line.indexOf("ERR")>=0;
    let body = line;
    if(body.startsWith("E:")) body=body.slice(2);
    if(body.startsWith("ERR: ")) body=body.slice(5);
    const code = error || /^(P:|T:|A:|M:|E:)/.test(line) || line.startsWith("E:");
    add("engine", body, {code, error});
  };

  function send(text){
    text=(text||"").trim(); if(!text) return;
    add("you", text);
    if(window.ipc && window.ipc.postMessage) window.ipc.postMessage(text);
  }

  $("send").onclick=()=>{ const v=$("input").value; $("input").value=""; send(v); $("input").focus(); };
  $("input").addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){ e.preventDefault(); $("input").value=""; send(e.target.value || $("input").dataset.last || e.target.defaultValue); }
  });
  // simpler enter handling
  $("input").onkeydown=(e)=>{ if(e.key==="Enter"){ const v=$("input").value; $("input").value=""; send(v); } };

  // ── reconnect: auto-retry once, then offer the modal ──
  const overlay=$("overlay"), reBtn=$("reconnect"), mErr=$("m-err"), banner=$("banner");
  let reconnectState="idle", wasAuto=false, autoRetries=0, waitTimer=null;

  function setReconnecting(on){
    reBtn.disabled=on;
    reBtn.innerHTML = on ? '<span class="spin"></span>Booting Fraymakers…' : 'Reconnect';
  }
  function showBanner(t){ document.getElementById("banner-text").textContent=t; banner.classList.add("show"); }
  function hideBanner(){ banner.classList.remove("show"); }
  function showModal(err){
    document.getElementById("m-msg").textContent="Fraymakers disconnected. Re-patch and boot it again to reconnect.";
    mErr.textContent=err||""; setReconnecting(false); overlay.classList.add("show");
  }
  function hideModal(){ overlay.classList.remove("show"); }
  function bootingText(t){
    if(banner.classList.contains("show")) document.getElementById("banner-text").textContent=t;
    if(overlay.classList.contains("show")) document.getElementById("m-msg").textContent=t;
  }
  function startWait(){ clearWait(); waitTimer=setTimeout(()=>bootingText("Fraymakers is taking a while to boot…"),8000); }
  function clearWait(){ if(waitTimer){clearTimeout(waitTimer);waitTimer=null;} }

  function beginReconnect(auto){
    reconnectState="active"; wasAuto=auto;
    if(auto) showBanner("Reconnecting to Fraymakers…");
    else { setReconnecting(true); document.getElementById("m-msg").textContent="Re-patching and booting Fraymakers…"; mErr.textContent=""; }
    startWait();
    if(window.ipc && window.ipc.postMessage) window.ipc.postMessage("@@reconnect");
  }

  window.onDisconnected=function(){
    setStatus(false); spawned=false;
    if(reconnectState==="active") return;
    if(autoRetries<1){ autoRetries++; beginReconnect(true); } // silent auto-retry once
    else showModal();                                         // then ask the user
  };
  window.onReconnecting=function(){ bootingText("Booting Fraymakers…"); };
  window.onReconnected=function(p, ch){
    if(p) port=p; if(ch) charName=ch; spawned=false; setStatus(true);
    clearWait(); reconnectState="idle"; hideBanner(); hideModal(); setReconnecting(false);
    add("system","Reconnected — booting "+charName+"…");
  };
  window.onReconnectFailed=function(msg){
    clearWait(); reconnectState="idle";
    if(wasAuto){ hideBanner(); showModal(msg||"Couldn’t reach Fraymakers."); }
    else { setReconnecting(false); mErr.textContent=msg||"Reconnect failed. Try again."; }
  };
  reBtn.onclick=function(){ beginReconnect(false); };

  window.addEventListener("DOMContentLoaded",()=>$("input").focus());
  $("input").focus();
</script>
</body>
</html>
