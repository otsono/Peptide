name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libsoup-3.0-dev \
          librsvg2-dev \
          libxdo-dev \
          pkg-config
    - name: Clippy (lint gate)
      run: |
        rustup component add clippy
        cargo clippy --workspace -- -D warnings
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --workspace --verbose
    - name: Note skipped integration tests
      if: always()
      run: |
        echo "::notice::Integration tests that need the SSF2 .ssf corpus are SKIPPED in CI \
        (the files are McLeodGaming content and aren't committed). They run locally with the \
        corpus at ../ssf2-ssfs/ or \$SSF2_SSFS_DIR. CI covers unit tests, the convention/doc \
        guards, and the build."
