name: Release (Linux)

# The macOS .app and Windows .exe are built + attached by tools/release.sh on the
# release host. Linux can't be cross-built from macOS (wry links the system
# WebKitGTK + GTK3 dev libs), so we build it natively here and attach it to the
# release. Fires once the release is published with the Mac + Windows zips.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install WebKitGTK + GTK3 dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev build-essential

      - name: Set up the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + build
        uses: Swatinem/rust-cache@v2

      - name: Build + stage the Linux binary
        run: ./tools/make-linux.sh

      - name: Package the Linux zip
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="Linux - Peptide ${VERSION}.zip"
          ( cd build/linux && zip -r -q "../../${ZIP}" peptide data )
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Attach the Linux zip to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.package.outputs.zip }}" --clobber
