# Headless match settings for peptide's `spawn` (start match) command.
# The SINGLE source of truth shared by BOTH engines (parsed by interpreter.rs).
# Universal defaults below = a never-ending debug match. Tweak and re-spawn — no
# rebuild needed. `#` starts a comment; unknown keys are ignored; a missing key
# falls back to its built-in default.
#
#   lives          : stock count per player (999 = effectively infinite)
#   time           : match timer in seconds (0 = no timer / unlimited)
#   damage_ratio   : multiplier on INCOMING damage when a hit lands (1.0 = normal,
#                    1.5 = 1.5×, …)
#   team_damage    : friendly fire on/off (true/false)
#   start_damage   : starting damage % each player begins at
#   using_stamina  : stamina/HP mode instead of stocks (true/false)
#   start_stamina  : starting stamina/HP (used when using_stamina = true)
#   size_ratio     : character size multiplier (1.0 = normal)
#   item_frequency : item spawn frequency (0 = items off)
#
# An edited copy next to the `peptide` binary / in the working dir / at
# $PEPTIDE_MATCH_SETTINGS overrides the built-in default WITHOUT a rebuild.
#
# Per-engine support (each engine applies the subset its match mode accepts;
# unsupported keys are silently ignored, the same way assists are a no-op on
# SSF2 and stamina is a no-op on Fraymakers):
#   SSF2 (versus mode)        : all keys.
#   Fraymakers (training mode): lives, time, item_frequency, team_damage.
#       damage_ratio / start_damage / size_ratio are SSF2-only — Fraymakers'
#       TrainingMode start-flow rejects them.
#
# Multiple players: both engines support `spawn a,b,…`. SSF2 adds idle dummies.
# Fraymakers launches player 1, then spawns each extra into the live match via
# Match.spawnPlayer (one per frame). Extra players inherit player 1's assist (the
# HUD requires one). Currently each extra character must already be loaded — use the
# same character as player 1, or a built-in; distinct custom chars are a work in progress.

lives = 999
time = 0
damage_ratio = 1.0
team_damage = false
start_damage = 0
using_stamina = false
start_stamina = 150
size_ratio = 1.0
item_frequency = 0
